name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install ruff pytest httpx

      - name: Lint with ruff
        run: ruff check app/main.py

      - name: Run tests
        run: pytest app/tests/ -v
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ollama-fastapi:${{ github.sha }} ./app
          docker build -t ollama-fastapi:latest ./app

      - name: Verify image
        run: |
          docker images | grep ollama-fastapi
          docker inspect ollama-fastapi:latest | grep -A5 "Healthcheck"

  validate-k8s:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate K8s manifests
        run: |
          kubectl apply --dry-run=client -f k8s/ollama/
          kubectl apply --dry-run=client -f k8s/fastapi/
