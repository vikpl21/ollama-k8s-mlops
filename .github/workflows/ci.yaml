name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt mlflow scikit-learn
          pip install ruff pytest httpx

      - name: Lint with ruff
        run: ruff check app/main.py

      - name: Run tests
        run: pytest app/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ollama-fastapi:${{ github.sha }} ./app
          docker build -t ollama-fastapi:latest ./app

      - name: Verify image
        run: docker images | grep ollama-fastapi

  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          kubeconform -strict -summary k8s/ollama/
          kubeconform -strict -summary k8s/fastapi/
          echo "All manifests valid!"
