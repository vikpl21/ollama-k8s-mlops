name: ML Training Pipeline

on:
  push:
    paths:
      - 'mlflow/experiments/**'
      - '.github/workflows/ml-pipeline.yaml'
  workflow_dispatch:

jobs:
  train-and-register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mlflow==3.11.1 \
            scikit-learn pandas numpy \
            google-cloud-storage \
            google-auth

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get MLflow token and run pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # Отримай токен через service account
          export MLFLOW_TRACKING_TOKEN=$(gcloud auth print-identity-token \
            --audiences="${{ secrets.MLFLOW_TRACKING_URI }}")
          
          echo "MLflow URI: $MLFLOW_TRACKING_URI"
          echo "Token obtained: ${MLFLOW_TRACKING_TOKEN:0:20}..."
          
          python3 mlflow/experiments/train_classifier.py

      - name: Verify results
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          export MLFLOW_TRACKING_TOKEN=$(gcloud auth print-identity-token \
            --audiences="${{ secrets.MLFLOW_TRACKING_URI }}")
          
          python3 -c "
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.MlflowClient()
          runs = client.search_runs(
            experiment_ids=['1'],
            order_by=['metrics.f1_score DESC'],
            max_results=3
          )
          for r in runs:
            print(f'Run: {r.info.run_name} | F1: {r.data.metrics.get(\"f1_score\",0):.4f}')
          print('Pipeline verified!')
          "
