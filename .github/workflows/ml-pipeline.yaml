name: ML Training Pipeline

on:
  push:
    paths:
      - 'mlflow/experiments/**'
  workflow_dispatch:

jobs:
  train-and-register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mlflow==3.11.1 scikit-learn pandas numpy \
            google-cloud-storage google-auth requests

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run ML pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # Cloud Run потребує токен без --audiences
          TOKEN=$(gcloud auth print-identity-token)
          export MLFLOW_TRACKING_TOKEN=$TOKEN
          
          echo "MLflow URI: $MLFLOW_TRACKING_URI"
          echo "Token prefix: ${TOKEN:0:30}..."
          
          python3 mlflow/experiments/train_classifier.py

      - name: Verify results
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          TOKEN=$(gcloud auth print-identity-token)
          export MLFLOW_TRACKING_TOKEN=$TOKEN
          
          python3 -c "
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.MlflowClient()
          runs = client.search_runs(
            experiment_ids=['1'],
            order_by=['metrics.f1_score DESC'],
            max_results=3
          )
          for r in runs:
            print(f'Run: {r.info.run_name} | F1: {r.data.metrics.get(\"f1_score\",0):.4f}')
          print('Pipeline verified successfully!')
          "
